services:
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: algonote-piston
    restart: unless-stopped
    privileged: true
    ports:
      - "127.0.0.1:2000:2000"
    volumes:
      - piston-packages:/piston/packages
    tmpfs:
      - /tmp:exec

volumes:
  piston-packages:
